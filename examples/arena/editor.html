<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bot Policy Lab</title>
<style>
:root{color-scheme:dark;font:14px/1.45 ui-monospace,SFMono-Regular,monospace;background:#080b10;color:#e8edf3;--line:#394352;--cyan:#36d7e8;--ink:#101722}*{box-sizing:border-box}body{margin:0;overflow-x:hidden}button,input,select,textarea{font:inherit;border-radius:0}button{border:1px solid var(--line);background:#182231;color:#fff;padding:9px 12px;cursor:pointer}button:hover{background:var(--cyan);color:#081016}button:disabled{opacity:.45;cursor:wait}a{color:var(--cyan)}bot-lab{display:block;max-width:1500px;margin:auto;padding:22px}.head{display:flex;justify-content:space-between;align-items:end;border-bottom:3px solid #eef3f8;padding-bottom:15px;margin-bottom:16px;gap:20px}.kicker,label,.label{color:#7e8b9d;font-size:11px;letter-spacing:.12em;text-transform:uppercase}h1{font:900 clamp(28px,5vw,60px)/.9 ui-monospace;margin:5px 0}h2{font-size:12px;letter-spacing:.14em;margin:0;padding:11px 13px;border-bottom:1px solid var(--line)}.grid{display:grid;grid-template-columns:minmax(300px,1fr) minmax(320px,1fr);gap:14px}.panel{border:1px solid var(--line);background:#0d131c;min-width:0;overflow:hidden}.body{padding:13px}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form label{display:grid;gap:6px}.form select,.form input{width:100%;background:#080c12;color:#fff;border:1px solid var(--line);padding:10px}.actions,.presets{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}.primary{background:#0f6974;border-color:var(--cyan)}.danger{background:#68243a}.status{padding:9px 12px;border-left:4px solid #7e8b9d;background:#151d28;margin-top:12px;overflow-wrap:anywhere}.status.ok{border-color:#4ade80}.status.err{border-color:#fb7185;color:#fecdd3}.revisions{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line);margin-bottom:14px}.rev{background:#111923;padding:10px;min-width:0}.rev b{display:block;overflow-wrap:anywhere;margin-top:4px}arena-preview{display:block}.board{display:grid;background:#1b2633;gap:1px;aspect-ratio:19/13}.cell{position:relative;background:#101927;min-width:0}.wall{background:#4a586b}.actor{position:absolute;inset:15%;border:1px solid white;display:grid;place-items:center;color:#061018;font-size:8px;font-style:normal;font-weight:bold;line-height:1}.power{position:absolute;inset:34%;background:#facc15;transform:rotate(45deg)}.shot{position:absolute;inset:42%;background:white}.preview-meta{padding:8px 12px;border-top:1px solid var(--line);color:#8d99a9}table{width:100%;border-collapse:collapse;table-layout:fixed}th,td{text-align:left;padding:9px;border-bottom:1px solid #27313e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}th{color:#7e8b9d}td button{padding:5px 7px}.agree{color:#4ade80}.disagree{color:#fb7185}details{margin-top:14px;border:1px solid var(--line)}summary{padding:12px;cursor:pointer;font-weight:bold}textarea{display:block;width:100%;min-height:420px;resize:vertical;background:#070b10;color:#cfe7e9;border:0;border-top:1px solid var(--line);padding:13px;tab-size:2}.wide{grid-column:1/-1}@media(max-width:820px){bot-lab{padding:12px}.grid{grid-template-columns:1fr}.form{grid-template-columns:1fr}.head{align-items:start;flex-direction:column}.revisions{grid-template-columns:1fr}th:nth-child(2),td:nth-child(2){display:none}}
</style></head><body><bot-lab></bot-lab><script type="module">
const api=async(path,options={})=>{const r=await fetch(path,{...options,headers:{'Content-Type':'application/json',...(options.headers||{})}});const text=await r.text();if(!r.ok)throw new Error(text.trim()||`${r.status}`);return text?JSON.parse(text):null};
class ArenaPreview extends HTMLElement{set snapshot(v){this._s=v;this.render()}render(){const s=this._s;if(!s)return;const at=(a,x,y)=>a.find(v=>v.x===x&&v.y===y);let cells='';for(let y=0;y<s.height;y++)for(let x=0;x<s.width;x++){const w=at(s.walls,x,y),p=at(s.powerups,x,y),q=at(s.projectiles,x,y),c=at(s.creatures,x,y);cells+=`<div class="cell ${w?'wall':''}">${p?'<i class="power"></i>':''}${q?'<i class="shot"></i>':''}${c?`<i class="actor" style="background:${c.color}">${c.bot?'AI':'P'}</i>`:''}</div>`}this.innerHTML=`<div class="board" style="grid-template-columns:repeat(${s.width},1fr)">${cells}</div><div class="preview-meta">AUTHORITATIVE · ${s.match} · TICK ${s.tick} · ${s.creatures.length} CREATURES</div>`}}
customElements.define('arena-preview',ArenaPreview);
class PolicyForm extends HTMLElement{connectedCallback(){this.innerHTML=`<div class="form"><label>Target priority<select><option value="nearest">Nearest target</option><option value="powerups">Powerups</option><option value="creatures">Creatures</option></select></label><label>Shoot range (tiles)<input type="number" min="0"></label></div><div class="presets"><button data-p="balanced">Balanced</button><button data-p="collector">Collector</button><button data-p="hunter">Hunter</button></div><div class="actions"><button data-a="validate">Validate draft</button><button class="primary" data-a="publish">Publish policy</button></div>`;this.querySelectorAll('input,select').forEach(x=>x.oninput=()=>this.emit('draft'));this.onclick=e=>{if(e.target.dataset.p){const p={balanced:['nearest',64],collector:['powerups',0],hunter:['creatures',64]}[e.target.dataset.p];this.value={target_priority:p[0],shoot_range:p[1]};this.emit('draft')}if(e.target.dataset.a)this.emit(e.target.dataset.a)}}emit(type){this.dispatchEvent(new CustomEvent(type,{bubbles:true,detail:this.value}))}get value(){return{target_priority:this.querySelector('select').value,shoot_range:Number(this.querySelector('input').value)}}set value(v){this.querySelector('select').value=v.target_priority;this.querySelector('input').value=v.shoot_range}}customElements.define('policy-form',PolicyForm);
class FleetTable extends HTMLElement{set data({bots,snapshot,current,busy}){const creatures=new Map((snapshot?.creatures||[]).filter(x=>x.bot).map(x=>[x.id,x]));this.innerHTML=`<table><thead><tr><th>Stable player</th><th>Controller / gen</th><th>Pinned policy</th><th>Position · HP · power · score · seq</th><th>Agreement</th><th></th></tr></thead><tbody>${bots.map(b=>{const c=creatures.get(b.player),ok=c&&c.controller===b.controller&&c.policy_revision===b.policy_revision;return`<tr><td>${b.player}</td><td title="${b.controller}">${b.controller} / ${b.generation}</td><td title="${b.policy_revision}">${b.policy_revision===current?'CURRENT ':''}${b.policy_revision}</td><td>${c?`${c.x},${c.y} · ${c.health} · ${c.power} · ${c.score} · ${c.last_sequence}`:'not observed'}</td><td class="${ok?'agree':'disagree'}">${ok?'AGREES':'MISMATCH'}</td><td><button data-player="${b.player}" ${busy?'disabled':''}>Roll out</button></td></tr>`}).join('')}</tbody></table>`;this.querySelectorAll('[data-player]').forEach(x=>x.onclick=()=>this.dispatchEvent(new CustomEvent('rollout',{bubbles:true,detail:x.dataset.player})))}}customElements.define('fleet-table',FleetTable);
class BotLab extends HTMLElement{constructor(){super();this.bots=[];this.stage='Draft';this.backoff=250;this.busy=true}connectedCallback(){this.innerHTML=`<header class="head"><div><div class="kicker">IMMUTABLE CONTROLLER POLICY</div><h1>BOT POLICY LAB</h1><a href="/">← Arena player UI</a></div><b id="socket">CONNECTING</b></header><div class="revisions"><div class="rev"><span class="label">State</span><b id="stage">DRAFT</b></div><div class="rev"><span class="label">Published revision</span><b id="published">—</b></div><div class="rev"><span class="label">Validated candidate</span><b id="validated">—</b></div></div><main class="grid"><section class="panel"><h2>LIVE ARENA PREVIEW</h2><arena-preview></arena-preview></section><section class="panel"><h2>POLICY DRAFT</h2><div class="body"><policy-form></policy-form><div id="feedback" class="status">Loading canonical policy…</div></div></section><section class="panel wide"><h2>FLEET / CONTROLLERS</h2><fleet-table></fleet-table><div class="body"><button id="all" class="primary">Roll out all bots</button></div></section></main><details><summary>ADVANCED · FULL DEFINITION JSON</summary><textarea spellcheck="false"></textarea><div class="body actions"><button id="rawValidate">Validate definition</button><button id="rawPublish" class="danger">Publish definition</button><button id="reload">Reload canonical</button></div></details>`;this.form=this.querySelector('policy-form');this.addEventListener('draft',()=>this.setStage('Draft'));this.addEventListener('validate',e=>this.policyAction('/bot-policy/validate','POST',e.detail,'Validated'));this.addEventListener('publish',e=>this.policyAction('/bot-policy','PUT',e.detail,'Published'));this.addEventListener('rollout',e=>this.rollout(`/bots/${encodeURIComponent(e.detail)}/rollout`));this.querySelector('#all').onclick=()=>this.rollout('/bots/rollout');this.querySelector('#reload').onclick=()=>this.loadDefinition();this.querySelector('#rawValidate').onclick=()=>this.raw('POST','/definitions/bot/validate','Validated');this.querySelector('#rawPublish').onclick=()=>this.raw('PUT','/definitions/bot','Published');this.refresh().finally(()=>{this.busy=false;this.renderFleet()});this.connect()}
setStage(v){this.stage=v;this.querySelector('#stage').textContent=v.toUpperCase()}feedback(text,ok=true){const e=this.querySelector('#feedback');e.textContent=text;e.className=`status ${ok?'ok':'err'}`}async refresh(){try{const [p,f]=await Promise.all([api('/bot-policy'),api('/bots')]);this.current=p.revision;this.form.value=p.policy;this.querySelector('#published').textContent=p.revision;this.bots=f.bots;await this.loadDefinition();this.renderFleet();this.setStage(this.bots.every(b=>b.policy_revision===this.current)?'Rolled Out':'Published');this.feedback('Canonical policy and fleet loaded.')}catch(e){this.feedback(e.message,false)}}async loadDefinition(){const r=await fetch('/definitions/bot');if(!r.ok)throw new Error(await r.text());this.querySelector('textarea').value=await r.text()}async policyAction(path,method,policy,stage){this.busy=true;this.renderFleet();try{const out=await api(path,{method,body:JSON.stringify(policy)});this.querySelector('#validated').textContent=out.revision;this.setStage(stage);this.feedback(`${stage}: ${out.revision}`);if(stage==='Published'){this.current=out.revision;this.querySelector('#published').textContent=out.revision;await this.loadDefinition()}await this.refreshBots()}catch(e){this.feedback(e.message,false)}finally{this.busy=false;this.renderFleet()}}async raw(method,path,stage){this.busy=true;this.renderFleet();try{JSON.parse(this.querySelector('textarea').value);const out=await api(path,{method,body:this.querySelector('textarea').value});this.querySelector('#validated').textContent=out.revision;this.setStage(stage);this.feedback(`${stage}: ${out.revision}`);if(stage==='Published')await this.refresh()}catch(e){this.feedback(e.message,false)}finally{this.busy=false;this.renderFleet()}}async rollout(path){this.busy=true;this.renderFleet();this.feedback('Rollout in progress…');try{await api(path,{method:'POST'});await this.refreshBots();this.setStage(this.bots.every(b=>b.policy_revision===this.current)?'Rolled Out':'Published');this.feedback('Rollout complete; fleet and snapshot will reconcile.')}catch(e){this.feedback(e.message,false)}finally{this.busy=false;this.renderFleet()}}async refreshBots(){this.bots=(await api('/bots')).bots;this.renderFleet()}renderFleet(){this.querySelector('fleet-table').data={bots:this.bots,snapshot:this.snapshot,current:this.current,busy:this.busy};this.querySelectorAll('policy-form button,policy-form input,policy-form select,details button,details textarea').forEach(x=>x.disabled=!!this.busy);this.querySelector('#all').disabled=!!this.busy}connect(){const status=this.querySelector('#socket'),scheme=location.protocol==='https:'?'wss:':'ws:';status.textContent='CONNECTING';this.ws=new WebSocket(`${scheme}//${location.host}/ws?match=match.main&spectate=1`);this.ws.onopen=()=>{status.textContent='LIVE / SPECTATOR';this.backoff=250};this.ws.onmessage=e=>{try{const m=JSON.parse(e.data);if(m.type==='snapshot'){this.snapshot=m.snapshot;this.querySelector('arena-preview').snapshot=m.snapshot;this.renderFleet()}}catch(e){this.feedback(e.message,false)}};this.ws.onclose=()=>{status.textContent='RECONNECTING';this.retry=setTimeout(()=>this.connect(),this.backoff);this.backoff=Math.min(5000,this.backoff*2)}}disconnectedCallback(){clearTimeout(this.retry);if(this.ws){this.ws.onclose=null;this.ws.close()}}}customElements.define('bot-lab',BotLab);
</script></body></html>
