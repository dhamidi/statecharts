<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bot Chart Workbench</title>
  <style>
    :root { color-scheme: dark; font: 14px/1.45 ui-monospace, SFMono-Regular, Consolas, monospace; background: #080b10; color: #e8edf3; --line: #344050; --muted: #8693a5; --cyan: #38d9e6; --green: #4ade80; --red: #fb7185; }
    * { box-sizing: border-box; }
    body { margin: 0; overflow-x: hidden; }
    button, textarea { border-radius: 0; font: inherit; }
    button { border: 1px solid var(--line); background: #151e2a; color: #eef4f8; cursor: pointer; padding: 8px 11px; }
    button:hover { background: var(--cyan); border-color: var(--cyan); color: #061014; }
    button:disabled { cursor: wait; opacity: .45; }
    a { color: var(--cyan); }
    bot-workbench { display: block; min-height: 100vh; padding: 18px; }
    .top { align-items: end; border-bottom: 3px solid #edf3f8; display: flex; gap: 24px; justify-content: space-between; padding-bottom: 13px; }
    .eyebrow, .label { color: var(--muted); font-size: 10px; letter-spacing: .13em; text-transform: uppercase; }
    h1 { font: 900 clamp(25px, 4vw, 46px)/.95 ui-monospace, monospace; margin: 4px 0 7px; }
    .revision { max-width: min(52vw, 700px); min-width: 0; text-align: right; }
    .revision code { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .toolbar { align-items: center; border: 1px solid var(--line); border-top: 0; display: flex; flex-wrap: wrap; gap: 7px; padding: 9px; }
    .divider { align-self: stretch; border-left: 1px solid var(--line); margin: 0 3px; }
    .deploy { align-items: center; display: flex; flex-wrap: wrap; gap: 5px; }
    .deploy button { font-size: 10px; padding: 5px 7px; }
    .deploy button.current { border-color: var(--green); color: var(--green); }
    .deploy button.old { border-color: #facc15; color: #facc15; }
    .primary { background: #0d6670; border-color: var(--cyan); }
    .publish { background: #24583a; border-color: var(--green); }
    .status { color: var(--muted); margin-left: auto; overflow-wrap: anywhere; }
    .status.ok { color: var(--green); }
    .status.error { color: var(--red); }
    .workspace { display: grid; gap: 12px; grid-template-columns: minmax(0, 1fr) 350px; margin-top: 12px; }
    .panel { background: #0d131c; border: 1px solid var(--line); min-width: 0; }
    .panel-head { align-items: center; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; min-height: 39px; padding: 8px 11px; }
    h2 { font-size: 11px; letter-spacing: .13em; margin: 0; }
    .editor-shell { display: grid; grid-template-columns: auto minmax(0, 1fr); }
    .line-numbers { background: #0a0e14; border-right: 1px solid #202a36; color: #4d5b6d; font: 13px/1.5 ui-monospace, SFMono-Regular, Consolas, monospace; height: calc(100vh - 166px); margin: 0; min-height: calc(100vh - 166px); overflow: hidden; padding: 14px 9px; text-align: right; user-select: none; }
    .line-numbers span { display: block; }
    textarea { background: #070a0f; border: 0; color: #d7edf0; display: block; font: 13px/1.5 ui-monospace, SFMono-Regular, Consolas, monospace; height: calc(100vh - 166px); min-height: calc(100vh - 166px); outline: none; overflow: auto; padding: 14px; resize: vertical; tab-size: 2; width: 100%; }
    textarea:focus { box-shadow: inset 3px 0 var(--cyan); }
    .rail { display: grid; gap: 12px; align-content: start; }
    .body { padding: 10px; }
    .action { border-bottom: 1px solid #27313e; padding: 10px 0; }
    .action:first-child { padding-top: 0; }
    .action:last-child { border-bottom: 0; padding-bottom: 0; }
    .action-head { align-items: center; display: flex; gap: 8px; justify-content: space-between; }
    .action code, .event code { color: var(--cyan); overflow-wrap: anywhere; }
    .action p, .event p { color: #a9b4c2; font-size: 11px; margin: 5px 0; }
    details { color: #728095; font-size: 10px; margin-top: 5px; }
    summary { cursor: pointer; }
    .notes { margin: 5px 0 0; padding-left: 16px; }
    .insert { font-size: 10px; padding: 4px 6px; white-space: nowrap; }
    .tokens { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
    .tokens code { background: #101925; border: 1px solid #293546; color: var(--cyan); padding: 3px 5px; }
    .surface { color: #a9b4c2; font-size: 11px; overflow-wrap: anywhere; }
    .surface b { color: #e8edf3; }
    @media (max-width: 850px) {
      bot-workbench { padding: 10px; }
      .top { align-items: start; flex-direction: column; }
      .revision { max-width: 100%; text-align: left; width: 100%; }
      .workspace { grid-template-columns: minmax(0, 1fr); }
      textarea, .line-numbers { height: 62vh; min-height: 62vh; }
      .status { flex-basis: 100%; margin-left: 0; }
      .divider { display: none; }
    }
  </style>
</head>
<body>
  <bot-workbench></bot-workbench>
  <script type="module">
    const request = async (path, options = {}) => {
      const response = await fetch(path, options);
      const text = await response.text();
      if (!response.ok) throw new Error(text.trim() || `${response.status}`);
      return { response, text, data: text ? JSON.parse(text) : null };
    };
    const escapeHTML = value => String(value).replace(/[&<>"']/g, character => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[character]);
    const shortRevision = revision => revision ? revision.replace('sha256:', '').slice(0, 12) : '—';

    class BotWorkbench extends HTMLElement {
      constructor() {
        super();
        this.bots = [];
        this.busy = true;
      }

      connectedCallback() {
        this.innerHTML = `
          <header class="top">
            <div><div class="eyebrow">LIVE DEFINITION / GO DATAMODEL</div><h1>BOT CHART WORKBENCH</h1><a href="/">← Arena</a></div>
            <div class="revision"><span class="label">Published revision</span><code id="current">—</code></div>
          </header>
          <nav class="toolbar">
            <button id="validate" class="primary">Validate</button>
            <button id="publish" class="publish">Publish revision</button>
            <button id="format">Format JSON</button>
            <button id="reload">Reload published</button>
            <span class="divider"></span><span class="label">Deploy</span><span id="fleet" class="deploy"></span><button id="rollout-all">ALL</button>
            <span id="status" class="status">LOADING</span>
          </nav>
          <main class="workspace">
            <section class="panel">
              <div class="panel-head"><h2>FULL DEFINITION</h2><span id="measure" class="label">0 LINES</span></div>
              <div class="editor-shell"><pre id="line-numbers" class="line-numbers" aria-hidden="true"></pre><textarea id="definition" aria-label="Full bot statechart Definition" spellcheck="false" wrap="off"></textarea></div>
            </section>
            <aside class="rail">
              <section class="panel"><div class="panel-head"><h2>ACTION VOCABULARY</h2></div><div id="actions" class="body"></div></section>
              <section class="panel"><div class="panel-head"><h2>REFERENCE</h2></div><div id="surface" class="body surface"></div></section>
            </aside>
          </main>`;
        this.editor = this.querySelector('#definition');
        this.editor.addEventListener('input', () => { this.validated = ''; this.setStatus('DIRTY'); this.measure(); });
        this.editor.addEventListener('scroll', () => { this.querySelector('#line-numbers').scrollTop = this.editor.scrollTop; });
        this.editor.addEventListener('keydown', event => {
          if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
            event.preventDefault();
            this.validate();
          }
        });
        this.querySelector('#validate').onclick = () => this.validate();
        this.querySelector('#publish').onclick = () => this.publish();
        this.querySelector('#format').onclick = () => this.format();
        this.querySelector('#reload').onclick = () => this.loadDefinition();
        this.querySelector('#rollout-all').onclick = () => this.rollout('/bots/rollout');
        this.initialize();
        this.poll = setInterval(() => this.refreshFleet(), 2000);
      }

      disconnectedCallback() { clearInterval(this.poll); }

      async initialize() {
        try {
          await Promise.all([this.loadDefinition(), this.loadVocabulary(), this.refreshFleet()]);
          this.setStatus('PUBLISHED', true);
        } catch (error) {
          this.setStatus(error.message, false, true);
        } finally {
          this.busy = false;
          this.renderFleet();
          this.setDisabled();
        }
      }

      async loadDefinition() {
        this.busy = true;
        this.setDisabled();
        try {
          const { response, text } = await request('/definitions/bot');
          this.current = response.headers.get('X-Statechart-Revision') || '';
          this.editor.value = text;
          this.validated = '';
          const current = this.querySelector('#current');
          current.textContent = this.current || '—';
          current.title = this.current;
          this.measure();
          this.setStatus('PUBLISHED', true);
          this.renderFleet();
        } catch (error) {
          this.setStatus(error.message, false, true);
        } finally {
          this.busy = false;
          this.setDisabled();
        }
      }

      async loadVocabulary() {
        const { data } = await request('/definitions/bot/vocabulary');
        this.vocabulary = data;
        this.querySelector('#actions').innerHTML = data.actions.map((action, index) => `
          <article class="action">
            <div class="action-head"><code>${escapeHTML(action.name)}@${escapeHTML(action.version)}</code><button class="insert" data-action="${index}">INSERT</button></div>
            <p>${escapeHTML(action.summary)}</p>
            <details><summary>CONTRACT</summary><ul class="notes">${(action.constraints || []).map(note => `<li>${escapeHTML(note)}</li>`).join('')}</ul></details>
          </article>`).join('');
        this.querySelectorAll('[data-action]').forEach(button => button.onclick = () => this.insertAction(Number(button.dataset.action)));
        this.querySelector('#surface').innerHTML = `<b>runtime events</b><div class="tokens">${data.events.map(event => `<code title="${escapeHTML(event.summary)}">${escapeHTML(event.name)}</code>`).join('')}</div><br><b>states</b><div class="tokens">${data.states.map(value => `<code>${escapeHTML(value)}</code>`).join('')}</div><br><b>executable content</b><div class="tokens">${data.executables.map(value => `<code>${escapeHTML(value)}</code>`).join('')}</div>`;
      }

      insertAction(index) {
        const action = this.vocabulary.actions[index];
        const snippet = JSON.stringify(action.example, null, 2);
        this.editor.setRangeText(snippet, this.editor.selectionStart, this.editor.selectionEnd, 'end');
        this.editor.focus();
        this.editor.dispatchEvent(new Event('input'));
      }

      format() {
        try {
          this.editor.value = JSON.stringify(JSON.parse(this.editor.value), null, 2) + '\n';
          this.editor.dispatchEvent(new Event('input'));
        } catch (error) {
          this.setStatus(`JSON: ${error.message}`, false, true);
        }
      }

      async validate() {
        this.busy = true;
        this.setDisabled();
        try {
          JSON.parse(this.editor.value);
          const { data } = await request('/definitions/bot/validate', { method: 'POST', body: this.editor.value });
          this.validated = data.revision;
          this.setStatus(`VALID · ${shortRevision(data.revision)}`, true);
        } catch (error) {
          this.validated = '';
          this.setStatus(error.message, false, true);
        } finally {
          this.busy = false;
          this.setDisabled();
        }
      }

      async publish() {
        this.busy = true;
        this.setDisabled();
        try {
          JSON.parse(this.editor.value);
          const { data } = await request('/definitions/bot', { method: 'PUT', body: this.editor.value });
          this.current = data.revision;
          this.validated = data.revision;
          const current = this.querySelector('#current');
          current.textContent = this.current;
          current.title = this.current;
          this.setStatus(`PUBLISHED · ${shortRevision(data.revision)}`, true);
          await this.refreshFleet();
        } catch (error) {
          this.setStatus(error.message, false, true);
        } finally {
          this.busy = false;
          this.renderFleet();
          this.setDisabled();
        }
      }

      async refreshFleet() {
        try {
          const { data } = await request('/bots');
          this.bots = data.bots;
          this.renderFleet();
        } catch (error) {
          this.setStatus(error.message, false, true);
        }
      }

      renderFleet() {
        const fleet = this.querySelector('#fleet');
        if (!fleet) return;
        fleet.innerHTML = this.bots.map(bot => {
          const current = bot.revision === this.current;
          return `<button class="${current ? 'current' : 'old'}" data-player="${escapeHTML(bot.player)}" title="${escapeHTML(bot.controller)} · generation ${bot.generation} · ${escapeHTML(bot.revision)}">${escapeHTML(bot.player)} · ${bot.generation}</button>`;
        }).join('') || '<span class="label">NO BOTS</span>';
        this.querySelectorAll('[data-player]').forEach(button => button.onclick = () => this.rollout(`/bots/${encodeURIComponent(button.dataset.player)}/rollout`));
        this.setDisabled();
      }

      async rollout(path) {
        this.busy = true;
        this.setDisabled();
        try {
          await request(path, { method: 'POST' });
          await this.refreshFleet();
          this.setStatus('ROLLOUT COMPLETE', true);
        } catch (error) {
          this.setStatus(error.message, false, true);
        } finally {
          this.busy = false;
          this.renderFleet();
          this.setDisabled();
        }
      }

      setDisabled() {
        this.querySelectorAll('button').forEach(button => button.disabled = this.busy);
        if (this.editor) this.editor.disabled = this.busy;
      }

      setStatus(message, ok = false, error = false) {
        const status = this.querySelector('#status');
        if (!status) return;
        status.textContent = message;
        status.className = `status${ok ? ' ok' : ''}${error ? ' error' : ''}`;
      }

      measure() {
        const count = this.editor.value.split('\n').length;
        this.querySelector('#measure').textContent = `${count} LINES · ${new Blob([this.editor.value]).size} BYTES`;
        this.querySelector('#line-numbers').innerHTML = Array.from({ length: count }, (_, index) => `<span>${index + 1}</span>`).join('');
      }
    }

    customElements.define('bot-workbench', BotWorkbench);
  </script>
</body>
</html>
